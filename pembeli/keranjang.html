<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Keranjang | Teras LA</title>

    <link rel="stylesheet"
        href="../assets/css/pembeli/keranjang.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <header class="header">

        <div class="container">

            <a href="dashboard.html" class="back-btn">

                <i class="fa-solid fa-arrow-left"></i>

            </a>

            <h2>Keranjang</h2>

        </div>

    </header>

    <!-- ========================= -->
    <!-- CART -->
    <!-- ========================= -->

    <section class="cart-section">

        <div class="container">

            <div id="cartContainer">

                <!-- Data keranjang akan ditampilkan oleh JS -->

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- SUMMARY -->
    <!-- ========================= -->

    <section class="summary">

        <div class="container">

            <div class="summary-box">

                <div class="row">

                    <span>Total</span>

                    <h2 id="totalHarga">

                        Rp0

                    </h2>

                </div>

                <button
                    id="checkoutBtn"
                    type="button">

                    Checkout

                </button>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- CONFIG -->
    <!-- ========================= -->

    <script src="../assets/js/config.js"></script>

    <!-- ========================= -->
    <!-- CART JS -->
    <!-- ========================= -->

    <script src="../assets/js/pembeli/keranjang.js"></script>

</body>

</html>
