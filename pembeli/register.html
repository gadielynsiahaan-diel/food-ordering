<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register Pembeli | Teras LA</title>

    <link rel="stylesheet"
        href="../assets/css/pembeli/register.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<a href="login.html" class="back-btn">

    <i class="fa-solid fa-house"></i>

    Login

</a>

<section class="register">

    <div class="card">

        <img
            src="../assets/img/logo.png"
            class="logo">

        <h2>

            Register Pembeli

        </h2>

        <p>

            Buat akun untuk mulai memesan makanan.

        </p>

        <form id="registerForm">

            <div class="input-group">

                <label>

                    Nama Lengkap

                </label>

                <input
                    type="text"
                    id="nama"
                    placeholder="Masukkan nama lengkap"
                    required>

            </div>

            <div class="input-group">

                <label>

                    Email

                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Masukkan email"
                    required>

            </div>

            <div class="input-group">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Masukkan password"
                    required>

            </div>

            <div class="input-group">

                <label>

                    Konfirmasi Password

                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Ulangi password"
                    required>

            </div>

            <button type="submit">

                Daftar

            </button>

        </form>

        <p class="login-link">

            Sudah punya akun?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>

</section>

<script src="../assets/js/config.js"></script>

<script src="../assets/js/pembeli/register.js"></script>

</body>

</html>
