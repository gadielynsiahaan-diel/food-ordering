<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login Pembeli | Teras LA</title>

    <link rel="stylesheet"
        href="../assets/css/pembeli/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="top-back">

        <a href="../index.html">

            <i class="fa-solid fa-house"></i>

            Home

        </a>

    </div>

    <div class="container">

        <div class="login-card">

            <img
                src="../assets/img/logo.png"
                class="logo">

            <h2>Login Pembeli</h2>

            <p>Selamat datang di Food Ordering Teras LA</p>

            <form id="loginForm">

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Masukkan email"
                        required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="password"
                            placeholder="Masukkan password"
                            required>

                        <i
                            class="fa-solid fa-eye"
                            id="togglePassword">

                        </i>

                    </div>

                </div>

                <button
                    type="submit"
                    id="btnLogin">

                    Login

                </button>

            </form>

            <div class="bottom">

                Belum punya akun?

                <a href="register.html">

                    Daftar

                </a>

            </div>

        </div>

    </div>

    <!-- CONFIG HARUS LEBIH DULU -->
    <script src="../assets/js/config.js"></script>

    <!-- BARU LOGIN -->
    <script src="../assets/js/pembeli/login.js"></script>

</body>

</html>
