<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Beri Rating</title>

    <link
        rel="stylesheet"
        href="../assets/css/pembeli/rating.css">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<header class="header">

    <div class="container">

        <a href="aktivitas.html">

            <i class="fa-solid fa-arrow-left"></i>

        </a>

        <h2>

            Beri Rating

        </h2>

    </div>

</header>

<section class="rating-section">

    <div class="container">

        <form id="ratingForm">

            <h3>

                Bagaimana pengalaman Anda?

            </h3>

            <div class="stars">

                <i
                    class="fa-solid fa-star"
                    data-value="1">

                </i>

                <i
                    class="fa-solid fa-star"
                    data-value="2">

                </i>

                <i
                    class="fa-solid fa-star"
                    data-value="3">

                </i>

                <i
                    class="fa-solid fa-star"
                    data-value="4">

                </i>

                <i
                    class="fa-solid fa-star"
                    data-value="5">

                </i>

            </div>

            <textarea

                id="komentar"

                placeholder="Tulis ulasan Anda...">

            </textarea>

            <button
                type="submit">

                Kirim Rating

            </button>

        </form>

    </div>

</section>

<script src="../assets/js/config.js"></script>

<script src="../assets/js/pembeli/rating.js"></script>

</body>

</html>
