<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <link rel="stylesheet"
        href="../assets/css/pembeli/checkout.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<header class="header">

    <div class="container">

        <a href="keranjang.html">

            <i class="fa-solid fa-arrow-left"></i>

        </a>

        <h2>Checkout</h2>

    </div>

</header>

<section class="checkout">

    <div class="container">

        <form id="checkoutForm">

            <div class="form-group">

                <label>Nama Pemesan</label>

                <input
                    type="text"
                    id="namaPemesan"
                    placeholder="Masukkan nama"
                    required>

            </div>

            <div class="form-group">

                <label>Nomor Meja</label>

                <input
                    type="number"
                    id="nomorMeja"
                    placeholder="Contoh : 12"
                    required>

            </div>

            <div class="form-group">

                <label>Metode Pembayaran</label>

                <select id="metodePembayaran">

                    <option value="Cash">

                        Tunai

                    </option>

                    <option value="QRIS">

                        QRIS

                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Catatan Tambahan</label>

                <textarea
                    id="catatan"
                    placeholder="Contoh : Tolong cepat ya 😊"></textarea>

            </div>

            <div class="total-box">

                <h3>Total</h3>

                <h2 id="totalHarga">

                    Rp0

                </h2>

            </div>

            <button
                type="submit"
                class="btn-checkout">

                Buat Pesanan

            </button>

        </form>

    </div>

</section>

<!-- CONFIG -->
<script src="../assets/js/config.js"></script>

<!-- JS -->
<script src="../assets/js/pembeli/checkout.js"></script>

</body>

</html>
