<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Teras LA - Dashboard</title>

    <link
        rel="stylesheet"
        href="../assets/css/pembeli/dashboard.css">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="container">

<div class="logo">

<img
src="../assets/img/logo.png"
alt="Logo">

<div>

<h2>

TERAS LA

</h2>

<span>

Food Ordering

</span>

</div>

</div>

<!-- SEARCH -->

<div class="search">

<i class="fa-solid fa-magnifying-glass"></i>

<input

type="text"

id="searchInput"

placeholder="Cari tenant atau menu...">

</div>

<!-- RIGHT -->

<div class="header-right">

<a
href="aktivitas.html">

<i class="fa-regular fa-bell"></i>

</a>

<a
href="keranjang.html">

<i class="fa-solid fa-cart-shopping"></i>

</a>

<a
href="profile.html">

<img

id="profileImage"

class="profile"

src=""

alt="Profile">

</a>

</div>

</div>

</header>

<!-- ================= HERO ================= -->

<section class="hero">

<div class="container">

<div class="hero-text">

<h1>

Selamat Datang 👋

</h1>

<p>

Jelajahi berbagai tenant favoritmu di Teras LA.

</p>

</div>

<div class="hero-image">

<img

src="../assets/img/logo.png"

alt="Logo">

</div>

</div>

</section>

<!-- ================= CATEGORY ================= -->

<section class="category">

<div class="container">

<button class="active">

Semua

</button>

<button>

🍜 Makanan

</button>

<button>

🥤 Minuman

</button>

<button>

🍩 Snack

</button>

<button>

☕

Kopi

</button>

</div>

</section>

<!-- ================= TENANT POPULER ================= -->

<section class="popular">

<div class="container">

<div class="section-title">

<h2>

🔥 Tenant Terpopuler

</h2>

</div>

<div id="popularContainer">

</div>

</div>

</section>

<!-- ================= SEMUA TENANT ================= -->

<section class="tenant">

<div class="container">

<div class="section-title">

<h2>

Semua Tenant

</h2>

</div>

<div id="tenantContainer">

</div>

</div>

</section>

<!-- ================= BOTTOM NAV ================= -->

<nav class="bottom-nav">

<a
href="dashboard.html"
class="active">

<i class="fa-solid fa-house"></i>

<span>

Home

</span>

</a>

<a
href="aktivitas.html">

<i class="fa-solid fa-receipt"></i>

<span>

Aktivitas

</span>

</a>

<a
href="keranjang.html">

<i class="fa-solid fa-cart-shopping"></i>

<span>

Keranjang

</span>

</a>

<a
href="profile.html">

<i class="fa-solid fa-user"></i>

<span>

Profile

</span>

</a>

</nav>

<script src="../assets/js/config.js"></script>

<script src="../assets/js/pembeli/dashboard.js"></script>

</body>

</html>
