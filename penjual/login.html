<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login Penjual</title>

    <link rel="stylesheet"
        href="../assets/css/penjual/login.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<!-- HOME -->

<a href="../index.html" class="home-btn">

    <i class="fa-solid fa-house"></i>

</a>

<div class="login-box">

    <img
        src="../assets/img/logo.png"
        class="logo"
        alt="Logo">

    <h2>

        Login Penjual

    </h2>

    <p>

        Masuk untuk mengelola tenant Anda.

    </p>

    <form id="loginForm">

        <input

            type="email"

            id="email"

            placeholder="Email"

            required>

        <input

            type="password"

            id="password"

            placeholder="Password"

            required>

        <button

            type="submit"

            id="btnLogin">

            Masuk

        </button>

    </form>

    <div class="register">

        Belum punya akun?

        <a href="register.html">

            Daftar

        </a>

    </div>

</div>

<!-- Config API -->
<script src="../assets/js/config.js"></script>

<!-- Login -->
<script src="../assets/js/penjual/login.js"></script>

</body>

</html>
