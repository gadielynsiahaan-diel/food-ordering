<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Edit Profile</title>

    <link
        rel="stylesheet"
        href="../assets/css/penjual/edit-profile.css">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

<header class="header">

    <div class="container">

        <a href="profile.html">

            ← Kembali

        </a>

        <h2>

            Edit Profile

        </h2>

    </div>

</header>

<section class="profile-section">

<div class="container">

<form id="profileForm">

<div class="profile-photo">

<img

id="previewFoto"

alt="Profile">

<label for="foto">

Pilih Foto

</label>

<input

type="file"

id="foto"

accept="image/*"

hidden>

</div>

<div class="form-group">

<label>

Nama

</label>

<input

type="text"

id="nama"

required>

</div>

<div class="form-group">

<label>

Email

</label>

<input

type="email"

id="email"

required>

</div>

<div class="form-group">

<label>

Password Baru

</label>

<input

type="password"

id="password"

placeholder="Kosongkan jika tidak diubah">

</div>

<div class="form-group">

<label>

Konfirmasi Password

</label>

<input

type="password"

id="confirmPassword"

placeholder="Ulangi password baru">

</div>

<button

type="submit"

id="btnSimpan">

Simpan Perubahan

</button>

</form>

</div>

</section>

<script src="../assets/js/config.js"></script>

<script src="../assets/js/penjual/edit-profile.js"></script>

</body>

</html>
