<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register Penjual</title>

    <link rel="stylesheet"
        href="../assets/css/penjual/register.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

<div class="register-box">

    <img
        src="../assets/img/logo.png"
        class="logo"
        alt="Logo">

    <h2>

        Daftar Penjual

    </h2>

    <p>

        Silakan buat akun terlebih dahulu.

    </p>

    <form id="registerForm">

        <input
            type="text"
            id="nama"
            placeholder="Nama Lengkap"
            required>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <input
            type="password"
            id="confirmPassword"
            placeholder="Konfirmasi Password"
            required>

        <button type="submit">

            Daftar

        </button>

    </form>

    <div class="login-link">

        Sudah punya akun?

        <a href="login.html">

            Login

        </a>

    </div>

</div>

<!-- Config API -->
<script src="../assets/js/config.js"></script>

<!-- Register -->
<script src="../assets/js/penjual/register.js"></script>

</body>

</html>
